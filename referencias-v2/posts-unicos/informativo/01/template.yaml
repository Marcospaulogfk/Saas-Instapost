# TEMPLATE: informativo-alerta-card-buttons
# Categoria: informativo/avisos
# Referência: comunicação/02/post_3_2.jpg (SafeGuard — "ATENÇÃO")
# Estilo: aviso/alerta, card centralizado, botões de decisão

template_id: informativo-alerta-card-buttons
categoria: informativo
estilo: alerta-cta-duplo
descricao: |
  Layout pra avisos importantes, alertas, comunicados ou decisões binárias.
  Fundo de cor sólida da marca com texto fantasma gigante de fundo. Card
  branco/claro centralizado com ícone de alerta, título uppercase, body
  curto e DOIS botões (CTA primário + secundário). Usado pra "Ignorar"/
  "Saiba Mais", "Aceitar"/"Recusar", "Sim"/"Não", etc.

# ============================================================
# CANVAS
# ============================================================
canvas:
  width: 1080
  height: 1350
  aspect_ratio: "4:5"
  background:
    type: solid_with_ghost_text
    primary_color: "{{brand.primary}}"  # roxo no original (#7C3AED)
    
    ghost_text:
      texto: "{{ghost_word}}"  # palavra grande de fundo (ex: "ATENÇÃO" repetido)
      font_family: "Anton"
      font_weight: 900
      font_size: 280
      color: "rgba(255,255,255,0.05)"  # quase invisível
      text_transform: uppercase
      position: { center }
      rotation: 0deg

# ============================================================
# HEADER — SITE/HANDLE
# ============================================================
header:
  position: { top: 60 }
  layout: split
  
  esquerda:
    texto: "{{brand.website}}"  # "SeuSite.com.br"
    font_family: "Inter"
    font_weight: 500
    font_size: 13
    color: "rgba(255,255,255,0.9)"
    letter_spacing: 0.1em
    margin_left: 60
  
  direita:
    icone: arrow_diagonal
    cor: "#FFFFFF"
    margin_right: 60

# ============================================================
# CARD CENTRAL (ALERTA)
# ============================================================
card_central:
  position: { center_x, center_y: 540 }
  width: 720
  background: "{{brand.surface}}"  # branco ou cinza claro (#F5F2EC)
  border_radius: 24
  padding: 48
  shadow:
    offset: { x: 0, y: 24 }
    blur: 60
    color: "rgba(0,0,0,0.2)"
  
  conteudo:
    - tipo: icone_alerta
      simbolo: "⚠"  # ou ícone customizado
      tamanho: 48
      cor: "{{brand.dark}}"
      alinhamento: center
      margin_bottom: 24
    
    - tipo: titulo
      texto: "ATENÇÃO"
      font_family: "Anton"
      font_weight: 800
      font_size: 64
      line_height: 1
      letter_spacing: -0.01em
      color: "{{brand.dark}}"
      text_transform: uppercase
      alinhamento: center
      margin_bottom: 16
    
    - tipo: body
      texto: "Monitore sua casa ou empresa em tempo real com sistema moderno e de última geração de CFTV."
      font_family: "Inter"
      font_weight: 400
      font_size: 16
      line_height: 1.5
      color: "{{brand.text_secondary}}"
      alinhamento: center
      margin_bottom: 32
    
    # BOTÕES DUPLOS
    - tipo: botoes_duplos
      layout: horizontal
      gap: 12
      
      botao_secundario:
        texto: "Ignorar"
        background: "transparent"
        border: "1px solid {{brand.dark}}"
        border_radius: 999
        padding: { x: 32, y: 14 }
        font_size: 14
        font_weight: 500
        color: "{{brand.dark}}"
        flex: 1
      
      botao_primario:
        texto: "Saiba Mais"
        background: "{{brand.primary}}"  # mesma cor do fundo
        border: none
        border_radius: 999
        padding: { x: 32, y: 14 }
        font_size: 14
        font_weight: 600
        color: "#FFFFFF"
        flex: 1
    
    - tipo: tagline_final
      texto: "Fique atento, nós cuidamos da sua segurança!"
      font_family: "Inter"
      font_weight: 500
      font_size: 13
      color: "{{brand.text_secondary}}"
      alinhamento: center
      margin_top: 24

# ============================================================
# FOOTER — LOGO
# ============================================================
footer:
  position: { bottom: 60, left: 60 }
  layout: horizontal
  gap: 12
  
  conteudo:
    - tipo: logo
      source: "{{brand.logo_white}}"
      height: 32
    - tipo: nome_marca
      texto: "{{brand.name}}"
      font_family: "Inter"
      font_weight: 700
      font_size: 16
      color: "#FFFFFF"
    - tipo: subtitulo_marca
      texto: "{{brand.tagline}}"  # "VIGILÂNCIA CONFIÁVEL"
      font_family: "Inter"
      font_weight: 400
      font_size: 10
      letter_spacing: 0.2em
      color: "rgba(255,255,255,0.7)"
      text_transform: uppercase

# ============================================================
# CUSTOMIZAÇÃO POR CLIENTE
# ============================================================
customizavel:
  texto:
    - ghost_text (palavra grande de fundo, 1 palavra forte)
    - titulo (1 palavra uppercase)
    - body (1-2 frases curtas)
    - botao_secundario (verbo, 1-2 palavras)
    - botao_primario (verbo CTA, 1-3 palavras)
    - tagline_final (1 frase reforço)
  
  cores:
    - brand.primary    # cor de fundo (roxo no original)
    - brand.surface    # cor do card (branco/cream)
    - brand.dark       # cor do texto principal
    - brand.text_secondary  # cor do body (cinza)
  
  imagens:
    - logo (versão branca pra footer)
  
  marca:
    - website
    - nome
    - tagline

fixo:
  - fundo de cor sólida da marca
  - palavra fantasma gigante de fundo
  - card branco centralizado
  - ícone de alerta no topo do card
  - estrutura: ícone → título → body → 2 botões → tagline
  - 2 botões SEMPRE (decisão binária)
  - logo no rodapé esquerdo

# ============================================================
# QUANDO USAR ESTE TEMPLATE
# ============================================================
ia_decide:
  use_quando:
    - cliente quer fazer alerta/aviso (segurança, atualizações, eventos)
    - copy traz decisão binária (Sim/Não, Aceitar/Recusar)
    - tema é importante mas não trágico
    - cliente é segurança, tecnologia, finanças, saúde
    - tom precisa ser direto e cta-driven
  
  nao_use_quando:
    - tema é educativo/inspiracional
    - precisa de mais de 2 opções
    - cliente é casual/jovem (vibe é séria)
    - tema é celebração/positivo

# ============================================================
# VARIAÇÕES POSSÍVEIS
# ============================================================
variantes:
  - alerta (default): ícone de aviso ⚠
  - sucesso: ícone de check ✓ (cor verde no fundo)
  - info: ícone de informação ℹ (cor azul no fundo)
  - update: ícone de refresh ↻ (cor neutra)
  - sem-icone: card só com título grande

# ============================================================
# OBSERVAÇÕES TÉCNICAS
# ============================================================
notas:
  - Ghost text de fundo precisa ser MUITO sutil (5-8% de opacidade)
  - Card branco precisa de sombra forte pra "flutuar" sobre o fundo colorido
  - Botões devem ser equilibrados visualmente (mesma largura via flex)
  - Botão primário usa MESMA cor do fundo (cria continuidade)
  - Botão secundário sempre outline (nunca preenchido)
  - Padding interno do card generoso (48px) pra dar respiro
